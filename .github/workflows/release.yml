name: Release

on:
  push:
    branches: [master]
    paths: [manifest.json]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: version
        run: |
          CURRENT=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          PREVIOUS=$(git show HEAD~1:manifest.json 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])" 2>/dev/null || echo "")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin
        if: steps.version.outputs.changed == 'true'
        run: bash build.sh

      - name: Create release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          RELEASE_ARGS=(--title "$VERSION")
          if [[ "$VERSION" == *-* ]]; then
            RELEASE_ARGS+=(--prerelease)
          fi
          # Use RELEASE_NOTES.md if it has content beyond the header, otherwise auto-generate
          BODY=$(sed '1{/^# Unreleased$/d;}' RELEASE_NOTES.md | sed '/^$/d')
          if [ -n "$BODY" ]; then
            gh release create "$VERSION" release/decidr.zip \
              "${RELEASE_ARGS[@]}" \
              --notes "$BODY"
          else
            gh release create "$VERSION" release/decidr.zip \
              "${RELEASE_ARGS[@]}" \
              --generate-notes
          fi

      - name: Trigger DecidR MCPViews installer rebuild
        if: steps.version.outputs.changed == 'true' && !contains(steps.version.outputs.current, '-')
        env:
          GH_TOKEN: ${{ secrets.MCPVIEWS_RELEASE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::MCPVIEWS_RELEASE_DISPATCH_TOKEN is not configured; skipping MCPViews installer rebuild dispatch."
            exit 0
          fi
          VERSION="${{ steps.version.outputs.current }}"
          jq -n \
            --arg source_repo "DeeJanuz/decidr-plugin" \
            --arg source_tag "$VERSION" \
            '{event_type:"branded-bundle-refresh", client_payload:{source_repo:$source_repo, source_tag:$source_tag}}' \
            | gh api repos/DeeJanuz/mcpviews/dispatches --method POST --input -

      - name: Clear release notes after stable release
        if: steps.version.outputs.changed == 'true' && !contains(steps.version.outputs.current, '-')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Reset RELEASE_NOTES.md to empty template
          echo "# Unreleased" > RELEASE_NOTES.md
          if git diff --quiet -- RELEASE_NOTES.md; then
            echo "RELEASE_NOTES.md already clear"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RELEASE_NOTES.md
          git commit -m "chore: clear release notes after ${{ steps.version.outputs.current }}"
          if ! git push; then
            echo "::warning::Could not push release-note cleanup; branch protection may require a pull request."
          fi
