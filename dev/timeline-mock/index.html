<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DecidR Timeline Mock</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      color-scheme: dark light;
      background: #0f1117;
      color: rgba(255,255,255,0.92);
      font-family: Figtree, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overflow-y: auto;
    }

    .mock-shell {
      width: 100%;
      min-height: 100vh;
    }

    .mock-banner {
      position: sticky;
      top: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,17,23,0.92);
      backdrop-filter: blur(12px);
      font-size: 12px;
      color: rgba(255,255,255,0.62);
    }

    .mock-banner strong {
      color: rgba(255,255,255,0.92);
      font-weight: 650;
    }

    .mock-banner code {
      color: #a5b4fc;
      font-size: 11px;
    }

    #timeline-root {
      min-height: calc(100vh - 42px);
    }

    @media (prefers-color-scheme: light) {
      html,
      body {
        background: #f5f5f7;
        color: rgba(15,23,42,0.92);
      }

      .mock-banner {
        border-bottom-color: rgba(100,116,139,0.2);
        background: rgba(255,255,255,0.92);
        color: rgba(51,65,85,0.68);
      }

      .mock-banner strong {
        color: rgba(15,23,42,0.92);
      }

      .mock-banner code {
        color: #4f46e5;
      }
    }

    html[data-decidr-theme="light"],
    html[data-decidr-theme="light"] body {
      background: #f5f5f7;
      color: rgba(15,23,42,0.92);
    }

    html[data-decidr-theme="light"] .mock-banner {
      border-bottom-color: rgba(100,116,139,0.2);
      background: rgba(255,255,255,0.92);
      color: rgba(51,65,85,0.68);
    }

    html[data-decidr-theme="light"] .mock-banner strong {
      color: rgba(15,23,42,0.92);
    }

    html[data-decidr-theme="light"] .mock-banner code {
      color: #4f46e5;
    }
  </style>
</head>
<body>
  <div class="mock-shell">
    <div class="mock-banner">
      <span><strong>DecidR timeline mock</strong> using local renderer source and mocked window data.</span>
      <span><code>dev/timeline-mock</code></span>
    </div>
    <main id="timeline-root"></main>
  </div>

  <script src="../../renderers/shared/00-api-client.js?v=20260605-light-theme"></script>
  <script src="../../renderers/shared/01-theme.js?v=20260605-light-theme"></script>
  <script src="../../renderers/shared/02-components.js?v=20260605-light-theme"></script>
  <script src="../../renderers/shared/03-slideouts.js?v=20260605-light-theme"></script>
  <script src="./mock-data.js?v=20260605-light-theme"></script>
  <script src="../../renderers/timeline.js?v=20260605-light-theme"></script>
  <script>
    (function() {
      var theme = new URLSearchParams(window.location.search).get('theme');
      if (theme === 'light') {
        document.documentElement.setAttribute('data-decidr-theme', 'light');
      } else if (theme === 'dark') {
        document.documentElement.setAttribute('data-decidr-theme', 'dark');
      }

      var payload = window.__decidrTimelineMockPayload;
      var orgs = [{
        id: 'mock-org',
        name: 'Mock DecidR Org',
        role: 'OWNER',
        tokenStatus: 'valid'
      }];

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      window.__decidrAPI.withReady = function(_container, _meta, renderFn) {
        renderFn();
      };
      window.__decidrAPI.resolveAndBindTargetOrg = function() {
        window.__decidrAPI.setActiveOrg('mock-org');
        return Promise.resolve({
          organizations: orgs,
          defaultOrgId: 'mock-org',
          activeOrgId: 'mock-org'
        });
      };
      window.__decidrAPI.getTimelineWindow = function(params) {
        var data = clone(payload);
        data.range = {
          from: params && params.from,
          to: params && params.to,
          bufferDays: params && params.bufferDays
        };
        return Promise.resolve({ data: data });
      };
      window.__decidrAPI.setDefaultOrg = function() {
        return Promise.resolve({ ok: true });
      };
      window.__decidrAPI.setActiveOrg('mock-org');

      if (window.__decidrUI && window.__decidrUI.SlideOut) {
        window.__decidrUI.SlideOut.open = function(type, id) {
          console.log('[mock] slideout requested', type, id);
        };
      }

      var root = document.getElementById('timeline-root');
      window.__renderers.decidr_timeline(root, {
        organization_id: 'mock-org',
        view: 'initiative',
        initiative_ids: ['init-decidr-dev']
      }, {}, {}, false, null);
    })();
  </script>
</body>
</html>
