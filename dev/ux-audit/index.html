<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DecidR UX Audit Harness</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      color-scheme: dark light;
      background: #0b1120;
      color: #f8fafc;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overflow-y: auto;
    }

    .audit-shell {
      min-height: 100vh;
    }

    .audit-toolbar {
      position: sticky;
      top: 0;
      z-index: 80;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(11, 17, 32, 0.94);
    }

    .audit-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .audit-title strong {
      font-size: 13px;
      color: #f8fafc;
    }

    .audit-title span {
      font-size: 11px;
      color: #94a3b8;
    }

    .audit-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .audit-tab {
      height: 30px;
      border: 1px solid rgba(148, 163, 184, 0.26);
      border-radius: 4px;
      background: #111827;
      color: #cbd5e1;
      font: inherit;
      font-size: 12px;
      padding: 0 10px;
      cursor: pointer;
    }

    .audit-tab.active,
    .audit-tab:focus-visible {
      color: #fff;
      border-color: #60a5fa;
      background: #2563eb;
      outline: 2px solid rgba(96, 165, 250, 0.45);
      outline-offset: 2px;
    }

    #audit-root {
      min-height: calc(100vh - 52px);
    }

    @media (prefers-color-scheme: light) {
      html,
      body {
        background: #f8fafc;
        color: #0f172a;
      }

      .audit-toolbar {
        border-bottom-color: rgba(100, 116, 139, 0.2);
        background: rgba(255, 255, 255, 0.94);
      }

      .audit-title strong {
        color: #0f172a;
      }

      .audit-title span {
        color: #64748b;
      }

      .audit-tab {
        background: #ffffff;
        color: #475569;
      }

      .audit-tab.active,
      .audit-tab:focus-visible {
        color: #ffffff;
        background: #2563eb;
      }
    }

    @media (max-width: 680px) {
      .audit-toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .audit-tabs {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="audit-shell">
    <header class="audit-toolbar">
      <div class="audit-title">
        <strong>DecidR plugin UX audit harness</strong>
        <span>Local branch renderer source with mocked read APIs</span>
      </div>
      <nav class="audit-tabs" aria-label="Audit surfaces">
        <button class="audit-tab active" data-surface="dashboard">Dashboard</button>
        <button class="audit-tab" data-surface="list">List</button>
        <button class="audit-tab" data-surface="timeline">Timeline</button>
        <button class="audit-tab" data-surface="auth">GitHub Auth</button>
      </nav>
    </header>
    <main id="audit-root"></main>
  </div>

  <script src="../../renderers/shared/00-api-client.js?v=ux-audit"></script>
  <script src="../../renderers/shared/01-theme.js?v=ux-audit"></script>
  <script src="../../renderers/shared/02-components.js?v=ux-audit"></script>
  <script src="../../renderers/shared/03-slideouts.js?v=ux-audit"></script>
  <script src="../timeline-mock/mock-data.js?v=ux-audit"></script>
  <script src="./mock-api.js?v=next-steps-filters"></script>
  <script src="../../renderers/list.js?v=ux-audit"></script>
  <script src="../../renderers/dashboard.js?v=ux-audit"></script>
  <script src="../../renderers/timeline.js?v=ux-audit"></script>
  <script src="../../renderers/github-auth.js?v=ux-audit"></script>
  <script>
    (function() {
      var root = document.getElementById('audit-root');
      var tabs = document.querySelectorAll('[data-surface]');

      function setActive(surface) {
        for (var i = 0; i < tabs.length; i++) {
          tabs[i].classList.toggle('active', tabs[i].getAttribute('data-surface') === surface);
        }
        root.innerHTML = '';
        if (surface === 'dashboard') {
          window.__renderers.decidr_dashboard(root, { organization_id: 'mock-org' }, {}, {}, false, null);
        } else if (surface === 'list') {
          window.__renderers.decidr_list(
            root,
            { data: window.__decidrAuditMock.projects },
            { tool_name: 'list_projects', result_count: window.__decidrAuditMock.projects.length },
            {},
            false,
            null
          );
        } else if (surface === 'timeline') {
          window.__renderers.decidr_timeline(root, {
            organization_id: 'mock-org',
            view: 'initiative',
            initiative_ids: ['init-decidr-dev']
          }, {}, {}, false, null);
        } else if (surface === 'auth') {
          window.__renderers.decidr_github_auth(root, { github_username: 'octocat' }, {}, {}, false, null);
        }
      }

      for (var i = 0; i < tabs.length; i++) {
        tabs[i].addEventListener('click', function(e) {
          setActive(e.currentTarget.getAttribute('data-surface'));
        });
      }

      setActive('dashboard');
    })();
  </script>
</body>
</html>
